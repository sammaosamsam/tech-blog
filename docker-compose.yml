# ============================================================
# Tech Blog - Docker Compose 远程镜像部署配置
#
# 镜像由 GitHub Actions 自动构建并推送到 ghcr.io
# 所有配置已内嵌到镜像中，服务器无需准备任何配置文件
#
# 启动：docker compose up -d
# 更新：docker compose pull && docker compose up -d
# ============================================================

services:

  # ----------------------------------------------------------
  # 应用服务
  # ----------------------------------------------------------
  tech-blog:
    image: ghcr.io/sammaosamsam/tech-blog/tech-blog:latest
    container_name: tech-blog-app
    restart: unless-stopped

    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATA_DIR=/app/backend/data

    volumes:
      - blog-data:/app/backend/data
      - blog-uploads:/app/backend/uploads

    expose:
      - "5000"

    networks:
      - internal

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # Nginx 反向代理（配置已内嵌镜像，无需挂载配置文件）
  # ----------------------------------------------------------
  nginx:
    image: ghcr.io/sammaosamsam/tech-blog/nginx:latest
    container_name: tech-blog-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    networks:
      - internal

    depends_on:
      tech-blog:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================
# 持久化卷
# ============================================================
volumes:
  blog-data:
  blog-uploads:

# ============================================================
# 网络
# ============================================================
networks:
  internal:
    driver: bridge
