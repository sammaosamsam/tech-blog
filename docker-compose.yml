version: '3.8'

# ============================================================
# Tech Blog - Docker Compose 生产配置
# 服务：tech-blog (Node.js App) + nginx (反向代理)
# ============================================================

services:

  # ----------------------------------------------------------
  # 应用服务：Node.js (React 前端 + Express 后端)
  # ----------------------------------------------------------
  tech-blog:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    image: tech-blog:latest
    container_name: tech-blog-app
    restart: unless-stopped

    environment:
      - NODE_ENV=production
      - PORT=5000
      # 数据库/存储路径（挂载卷内）
      - DATA_DIR=/app/backend/data

    volumes:
      # 持久化博客数据（文章、配置等）
      - blog-data:/app/backend/data
      # 持久化上传文件
      - blog-uploads:/app/backend/uploads

    expose:
      # 仅对内部网络暴露端口，不直接对外
      - "5000"

    networks:
      - internal

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # Nginx 反向代理：对外提供 HTTP/HTTPS 入口
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: tech-blog-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Nginx 配置文件
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL 证书目录（如使用 HTTPS）
      - ./nginx/certs:/etc/nginx/certs:ro
      # Nginx 访问/错误日志
      - nginx-logs:/var/log/nginx

    networks:
      - internal

    depends_on:
      tech-blog:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================
# 持久化卷
# ============================================================
volumes:
  blog-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data

  blog-uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./uploads

  nginx-logs:
    driver: local

# ============================================================
# 网络
# ============================================================
networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
