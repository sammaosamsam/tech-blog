# ============================================================
# Tech Blog - Docker Compose 部署配置
#
# 直接使用 Node.js 应用对外提供服务（无 Nginx）
# 镜像由 GitHub Actions 自动构建推送到 ghcr.io（公开）
#
# 首次启动：docker compose up -d
# 更新镜像：docker compose pull && docker compose up -d
# ============================================================

services:

  tech-blog:
    image: ghcr.io/sammaosamsam/tech-blog/tech-blog:latest
    container_name: tech-blog-app
    restart: unless-stopped

    ports:
      - "80:5000"      # 对外 80 端口映射到容器 5000
      - "5000:5000"    # 同时保留 5000 端口直接访问

    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATA_DIR=/app/backend/data

    volumes:
      - blog-data:/app/backend/data
      - blog-uploads:/app/backend/uploads

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================
# 持久化卷
# ============================================================
volumes:
  blog-data:
  blog-uploads:
