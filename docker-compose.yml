version: '3.8'

services:
  tech-blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tech-blog-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      # 持久化数据目录
      - ./data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - tech-blog-network

networks:
  tech-blog-network:
    driver: bridge
