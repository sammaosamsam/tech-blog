# ============================================================
# Tech Blog - Docker Compose 远程镜像部署配置
#
# 镜像由 GitHub Actions 自动构建并推送到 ghcr.io
# 部署前需登录：docker login ghcr.io -u <GitHub用户名> -p <PAT>
#
# 启动：docker compose up -d
# 更新：docker compose pull && docker compose up -d
# ============================================================

services:

  # ----------------------------------------------------------
  # 应用服务：从 GitHub Container Registry 拉取镜像
  # ----------------------------------------------------------
  tech-blog:
    image: ghcr.io/sammaosamsam/tech-blog/tech-blog:latest
    container_name: tech-blog-app
    restart: unless-stopped

    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATA_DIR=/app/backend/data

    volumes:
      - blog-data:/app/backend/data
      - blog-uploads:/app/backend/uploads

    expose:
      - "5000"

    networks:
      - internal

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # Nginx 反向代理
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: tech-blog-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx

    networks:
      - internal

    depends_on:
      tech-blog:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================
# 持久化卷
# ============================================================
volumes:
  blog-data:
  blog-uploads:
  nginx-logs:

# ============================================================
# 网络
# ============================================================
networks:
  internal:
    driver: bridge
